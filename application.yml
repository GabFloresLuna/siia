spring:
  application:
    name: siia

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3399/siia_db?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:siia_user}
    password: ${SPRING_DATASOURCE_PASSWORD:siia_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        '[format_sql]': true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    root: INFO
    '[cl.duocuc.siia]': DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always