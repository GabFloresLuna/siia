version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: siia_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: siia_db
      MYSQL_USER: siia_user
      MYSQL_PASSWORD: siia_pass
    ports:
      - "3399:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - siia_network

volumes:
  mysql_data:

networks:
  siia_network:
    driver: bridge